version: '3.8'

services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    # Mount the AL project workspace
    volumes:
      # Primary workspace — the AL project repo
      - ..:/workspace:cached

      # Persist Claude Code authentication & config across container rebuilds
      - claude-config:/home/vscode/.claude

      # Persist VS Code extensions across container rebuilds
      - vscode-extensions:/home/vscode/.vscode-server/extensions

      # Persist PowerShell modules across container rebuilds
      - pwsh-modules:/home/vscode/.local/share/powershell

      # Share host Git config (read-only)
      - ~/.gitconfig:/home/vscode/.gitconfig:ro

      # Share host SSH keys for GitHub access (read-only)
      - ~/.ssh:/home/vscode/.ssh:ro

    # Keep container running
    command: sleep infinity

    # Environment variables
    environment:
      # AL development
      - AL_LANGUAGE_EXTENSION_PATH=/home/vscode/.vscode-server/extensions

      # PowerShell
      - POWERSHELL_TELEMETRY_OPTOUT=1

      # Node.js
      - NODE_ENV=development

    # Resource limits — adjust based on your machine
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

    # Network
    network_mode: bridge

# Named volumes — persist data across container rebuilds
volumes:
  claude-config:
    name: enko-al-claude-config

  vscode-extensions:
    name: enko-al-vscode-extensions

  pwsh-modules:
    name: enko-al-pwsh-modules
